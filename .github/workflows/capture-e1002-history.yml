name: Capture E1002 Sensor History

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch E1002 sensor values and update history
        env:
          SENSECRAFT_API_KEY: ${{ secrets.SENSECRAFT_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const deviceId = "20223417";
          const endpoint =
            `https://sensecraft-hmi-api.seeed.cc/api/v1/user/device/iot_data/${deviceId}`;

          async function main() {
            if (!process.env.SENSECRAFT_API_KEY) {
              throw new Error("SENSECRAFT_API_KEY is missing.");
            }

            const response = await fetch(endpoint, {
              headers: {
                "Api-Key": process.env.SENSECRAFT_API_KEY,
                "Accept": "application/json"
              }
            });

            const responseText = await response.text();

            if (!response.ok) {
              throw new Error(
                `SenseCraft API failed: ${response.status} ${responseText}`
              );
            }

            let payload;

            try {
              payload = JSON.parse(responseText);
            } catch {
              throw new Error(
                `SenseCraft API returned invalid JSON: ${responseText}`
              );
            }

            console.log("Top-level response keys:", Object.keys(payload || {}));
            console.log("Response code:", payload?.code);
            console.log("Result keys:", Object.keys(payload?.result || {}));
            console.log(
              "Battery object:",
              JSON.stringify(payload?.result?.battery || null)
            );
            console.log(
              "Sensor object:",
              JSON.stringify(payload?.result?.sensor || null)
            );

            if (payload.code !== 200 || !payload.result) {
              throw new Error(
                `Unexpected SenseCraft response: ${JSON.stringify(payload)}`
              );
            }

            const result = payload.result;

            const batteryRaw =
              result?.battery?.voltage ??
              result?.battery?.level ??
              result?.battery?.value ??
              result?.batteryLevel ??
              result?.battery_level;

            const temperatureRaw =
              result?.sensor?.temp ??
              result?.sensor?.temperature ??
              result?.temperature;

            const humidityRaw =
              result?.sensor?.humidity ??
              result?.humidity;

            const reading = {
              timestamp: new Date().toISOString(),
              battery: Number(batteryRaw),
              charging: Boolean(result?.battery?.charging),
              temperature: Number(temperatureRaw),
              humidity: Number(humidityRaw)
            };

            console.log(
              "Parsed reading:",
              JSON.stringify({
                battery: reading.battery,
                charging: reading.charging,
                temperature: reading.temperature,
                humidity: reading.humidity
              })
            );

            for (const key of ["battery", "temperature", "humidity"]) {
              if (!Number.isFinite(reading[key])) {
                throw new Error(
                  `Invalid ${key} value from SenseCraft API.`
                );
              }
            }

            const folder = "data";
            const historyFile = path.join(folder, "sensor-history.json");

            fs.mkdirSync(folder, { recursive: true });

            let history = {
              updatedAt: null,
              readings: []
            };

            if (fs.existsSync(historyFile)) {
              try {
                history = JSON.parse(fs.readFileSync(historyFile, "utf8"));
              } catch {
                console.log("Existing history file was invalid; starting fresh.");
              }
            }

            const cutoff = Date.now() - (7 * 24 * 60 * 60 * 1000);

            history.readings = Array.isArray(history.readings)
              ? history.readings
              : [];

            history.readings.push(reading);

            history.readings = history.readings
              .filter(item => {
                const timestamp = new Date(item.timestamp).getTime();
                return Number.isFinite(timestamp) && timestamp >= cutoff;
              })
              .sort(
                (a, b) =>
                  new Date(a.timestamp).getTime() -
                  new Date(b.timestamp).getTime()
              );

            history.updatedAt = reading.timestamp;

            fs.writeFileSync(
              historyFile,
              `${JSON.stringify(history, null, 2)}\n`,
              "utf8"
            );

            console.log("Sensor history saved successfully.");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit updated sensor history
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/sensor-history.json
          git commit -m "Update E1002 sensor history"
          git push
