name: Capture E1002 Sensor History

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch E1002 sensor values and update history
        env:
          SENSECRAFT_API_KEY: ${{ secrets.SENSECRAFT_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const deviceId = "20223417";
          const retentionDays = 366;

          const endpoint =
            `https://sensecraft-hmi-api.seeed.cc/api/v1/user/device/iot_data/${deviceId}`;

          function csvEscape(value) {
            const text = value === null || value === undefined ? "" : String(value);
            return `"${text.replace(/"/g, '""')}"`;
          }

          function statusLabel(rawStatus) {
            if (rawStatus === 1) return "Online";
            if (rawStatus === 3) return "Sleep";
            return "Unknown";
          }

          async function main() {
            if (!process.env.SENSECRAFT_API_KEY) {
              throw new Error("SENSECRAFT_API_KEY is missing.");
            }

            const response = await fetch(endpoint, {
              headers: {
                "Api-Key": process.env.SENSECRAFT_API_KEY,
                "Accept": "application/json"
              }
            });

            const responseText = await response.text();

            if (!response.ok) {
              throw new Error(
                `SenseCraft API failed: ${response.status} ${responseText}`
              );
            }

            const payload = JSON.parse(responseText);

            if (payload.code !== 200 || !payload.result) {
              throw new Error(
                `Unexpected SenseCraft response: ${JSON.stringify(payload)}`
              );
            }

            const result = payload.result;

            const rawStatus = Number(result?.deviceStatus?.status);
            const intervalSeconds = Number(result?.dataaccess?.interval);

            const reading = {
              timestamp: new Date().toISOString(),

              battery: Number(
                result?.battery?.level ??
                result?.battery?.voltage ??
                result?.battery?.value
              ),

              charging: Boolean(result?.battery?.charging),

              temperature: Number(
                result?.sensor?.temp ??
                result?.sensor?.temperature
              ),

              humidity: Number(result?.sensor?.humidity),

              status: statusLabel(rawStatus),
              rawStatus: Number.isFinite(rawStatus) ? rawStatus : null,

              refreshIntervalMinutes: Number.isFinite(intervalSeconds)
                ? Math.round(intervalSeconds / 60)
                : null,

              deepSleepDisabled:
                result?.power?.deep_sleep_disabled === undefined
                  ? null
                  : Number(result.power.deep_sleep_disabled)
            };

            for (const key of ["battery", "temperature", "humidity"]) {
              if (!Number.isFinite(reading[key])) {
                throw new Error(`Invalid ${key} value from SenseCraft API.`);
              }
            }

            const folder = "data";
            const historyFile = path.join(folder, "sensor-history.json");
            const csvFile = path.join(folder, "e1002-status-history.csv");

            fs.mkdirSync(folder, { recursive: true });

            let history = {
              updatedAt: null,
              readings: []
            };

            if (fs.existsSync(historyFile)) {
              history = JSON.parse(fs.readFileSync(historyFile, "utf8"));
            }

            history.readings = Array.isArray(history.readings)
              ? history.readings
              : [];

            const cutoff =
              Date.now() - (retentionDays * 24 * 60 * 60 * 1000);

            history.readings.push(reading);

            history.readings = history.readings
              .filter(item => {
                const time = new Date(item.timestamp).getTime();
                return Number.isFinite(time) && time >= cutoff;
              })
              .sort(
                (a, b) =>
                  new Date(a.timestamp).getTime() -
                  new Date(b.timestamp).getTime()
              );

            history.updatedAt = reading.timestamp;

            fs.writeFileSync(
              historyFile,
              `${JSON.stringify(history, null, 2)}\n`,
              "utf8"
            );

            const csvHeader = [
              "timestamp",
              "status",
              "rawStatus",
              "battery",
              "charging",
              "temperature",
              "humidity",
              "refreshIntervalMinutes",
              "deepSleepDisabled"
            ];

            const csvRows = history.readings.map(item => [
              item.timestamp,
              item.status ?? "Unknown",
              item.rawStatus ?? "",
              item.battery ?? "",
              item.charging ?? "",
              item.temperature ?? "",
              item.humidity ?? "",
              item.refreshIntervalMinutes ?? "",
              item.deepSleepDisabled ?? ""
            ]);

            const csvContent = [
              csvHeader.map(csvEscape).join(","),
              ...csvRows.map(row => row.map(csvEscape).join(","))
            ].join("\n") + "\n";

            fs.writeFileSync(csvFile, csvContent, "utf8");

            console.log("Saved E1002 reading:", reading);
            console.log(`Retaining ${retentionDays} days of history.`);
            console.log(`Created CSV log: ${csvFile}`);
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit updated sensor history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/sensor-history.json data/e1002-status-history.csv

          if git diff --cached --quiet; then
            echo "No sensor-history changes to commit."
            exit 0
          fi

          git commit -m "Update E1002 sensor and status history"
          git push
